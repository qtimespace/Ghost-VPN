<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}
canvas{display:block}
#clock{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:1.2em;font-weight:300;letter-spacing:2px;text-shadow:0 0 8px rgba(0,0,0,.4);z-index:10}

<body>
<canvas id="c"></canvas>
<div id="clock"></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,GY;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;GY=H*.78}
addEventListener('resize',resize);resize();

// ── Utils ──
function lerp(a,b,t){return a+(b-a)*t}
function rng(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const R=rng(42);
function rr(a,b){return lerp(a,b,R())}

// ── Stars ──
const stars=Array.from({length:180},()=>({x:R(),y:R()*.7,r:R()*1.5+.3,tw:R()*6.28,sp:R()*.02+.005}));

// ── Moon phase ──
function moonPhase(d){let y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();if(m<3){y--;m+=12}let c=Math.floor(365.25*y),e=Math.floor(30.6001*(m+1)),j=c+e+day-694039.09;j/=29.5305882;return j-Math.floor(j)}

// ── Sky ──
function drawSky(da){
const g=X.createLinearGradient(0,0,0,H);
const dt=[135,206,235],db=[176,226,255],nt=[10,10,35],nb=[25,25,60],st=[255,100,50],sb=[255,180,100];
let t=[0,0,0],b=[0,0,0];
if(da>.6){const d=(da-.6)/.4;for(let i=0;i<3;i++){t[i]=lerp(st[i],dt[i],d);b[i]=lerp(sb[i],db[i],d)}}
else if(da>.2){const d=(da-.2)/.4;for(let i=0;i<3;i++){t[i]=lerp(nt[i],st[i],d);b[i]=lerp(nb[i],sb[i],d)}}
else{t=nt.slice();b=nb.slice()}
g.addColorStop(0,`rgb(${t[0]|0},${t[1]|0},${t[2]|0})`);
g.addColorStop(1,`rgb(${b[0]|0},${b[1]|0},${b[2]|0})`);
X.fillStyle=g;X.fillRect(0,0,W,H);
}

function drawStars(op){
if(op<.05)return;const n=performance.now()/1e3;
stars.forEach(s=>{const tw=.5+.5*Math.sin(n*s.sp*10+s.tw);X.beginPath();X.arc(s.x*W,s.y*H,s.r,0,6.28);X.fillStyle=`rgba(255,255,240,${op*tw})`;X.fill()});
}

function drawSun(h){
const sr=6,ss=18;if(h<sr||h>ss)return;
const p=(h-sr)/(ss-sr),a=Math.PI*p,x=W*(.1+.8*p),y=GY-Math.sin(a)*H*.55;
const gl=X.createRadialGradient(x,y,15,x,y,100);gl.addColorStop(0,'rgba(255,255,200,.5)');gl.addColorStop(1,'rgba(255,200,50,0)');X.fillStyle=gl;X.fillRect(x-100,y-100,200,200);
X.beginPath();X.arc(x,y,22,0,6.28);const sg=X.createRadialGradient(x-3,y-3,3,x,y,22);sg.addColorStop(0,'#fffde0');sg.addColorStop(1,'#ffcc33');X.fillStyle=sg;X.fill();
}

function drawMoon(h){
const ph=moonPhase(new Date()),mr=20-ph*3;let hh=h;if(hh<12)hh+=24;if(hh<mr||hh>mr+10)return;
const p=(hh-mr)/10,a=Math.PI*p,x=W*(.1+.8*p),y=GY-Math.sin(a)*H*.5,r=18;
const gl=X.createRadialGradient(x,y,10,x,y,60);gl.addColorStop(0,'rgba(200,220,255,.25)');gl.addColorStop(1,'rgba(200,220,255,0)');X.fillStyle=gl;X.fillRect(x-60,y-60,120,120);
X.beginPath();X.arc(x,y,r,0,6.28);X.fillStyle='#e8e8e0';X.fill();
X.save();X.beginPath();X.arc(x,y,r+1,0,6.28);X.clip();
X.beginPath();X.arc(x+Math.cos(ph*6.28)*r*1.2,y,r,0,6.28);X.fillStyle='rgba(10,10,35,.9)';X.fill();X.restore();
}

function drawClouds(da){
const n=performance.now()/1e3,al=da>.3?.12:.04;
for(let i=0;i<5;i++){const cx=((n*(6+i*2)+i*300)%(W+300))-150,cy=50+i*45+Math.sin(n*.15+i)*8;
X.fillStyle=`rgba(255,255,255,${al})`;for(let j=0;j<4;j++){X.beginPath();X.arc(cx+j*22,cy+Math.sin(j)*4,16+j*4,0,6.28);X.fill()}}
}

// ── Buildings ──
const BLDGS=[];
function initBuildings(){
BLDGS.length=0;
// Left side: residential district
const resX=W*.02,resW=W*.42;
// Apartment blocks
const apts=[
{x:resX,w:55,h:120,floors:5,color:'#8B7355',type:'apt',name:'house'},
{x:resX+65,w:45,h:90,floors:4,color:'#9C8B6E',type:'apt',name:'house'},
{x:resX+120,w:60,h:140,floors:6,color:'#7A6B5D',type:'apt',name:'house'},
{x:resX+190,w:50,h:100,floors:4,color:'#8E7F6F',type:'apt',name:'house'},
{x:resX+250,w:55,h:130,floors:5,color:'#85776A',type:'apt',name:'house'},
// Small houses
{x:resX+315,w:35,h:45,floors:2,color:'#A0522D',type:'house',name:'house'},
{x:resX+358,w:38,h:50,floors:2,color:'#CD853F',type:'house',name:'house'},
];
// Park area in center
const parkX=W*.46,parkW=W*.08;

// Right side: commercial/institutional district
const comX=W*.56,comW=W*.42;
const coms=[
{x:comX,w:70,h:60,floors:2,color:'#4682B4',type:'school',name:'school'},
{x:comX+80,w:55,h:50,floors:2,color:'#5F9EA0',type:'kindergarten',name:'kinder'},
{x:comX+145,w:80,h:110,floors:4,color:'#708090',type:'office',name:'office'},
{x:comX+235,w:65,h:90,floors:3,color:'#778899',type:'office',name:'office2'},
{x:comX+310,w:50,h:40,floors:1,color:'#6B8E23',type:'shop',name:'shop'},
{x:comX+370,w:45,h:55,floors:2,color:'#B8860B',type:'cafe',name:'cafe'},
];
apts.forEach(b=>BLDGS.push({...b,side:'left'}));
coms.forEach(b=>BLDGS.push({...b,side:'right'}));
}
initBuildings();

// Seeded hash for stable per-window randomness (changes every 15 min)
function winHash(bx,floor,col,slot){
let h=(bx*397+floor*113+col*59+slot*7919)|0;
h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;
return(h&0xffff)/0xffff;
}

function windowLit(bldg,floor,col,hour){
const t=bldg.type;
const slot=Math.floor(hour*4); // changes every 15 min
const r=winHash(bldg.x,floor,col,slot);
if(t==='school'||t==='kindergarten'){return hour>=7.5&&hour<=17?r>.2:false}
if(t==='office'){return hour>=8&&hour<=20?r>.15:hour>=20&&hour<=22?r>.7:false}
if(t==='shop'){return hour>=9&&hour<=21?r>.1:false}
if(t==='cafe'){return hour>=7&&hour<=23?r>.15:hour>=23||hour<=1?r>.6:false}
if(t==='apt'||t==='house'){
if(hour>=23||hour<5)return r>.75;
if(hour>=5&&hour<7)return r>.5;
if(hour>=7&&hour<9)return r>.4;
if(hour>=9&&hour<17)return r>.7;
if(hour>=17&&hour<20)return r>.2;
if(hour>=20&&hour<23)return r>.25;
}
return r>.5;
}

function drawBuilding(b,hour,da){
const by=GY-b.h;
// Building body
X.fillStyle=da>.3?b.color:shadeColor(b.color,-.4);
X.fillRect(b.x,by,b.w,b.h);

// Roof
if(b.type==='house'){
X.beginPath();X.moveTo(b.x-5,by);X.lineTo(b.x+b.w/2,by-20);X.lineTo(b.x+b.w+5,by);X.closePath();
X.fillStyle=da>.3?'#8B4513':'#4a2a0a';X.fill();
}else if(b.type==='school'){
// Flag on school
X.fillStyle='#666';X.fillRect(b.x+b.w/2-1,by-25,2,25);
const flagWave=Math.sin(performance.now()/500)*2;
X.fillStyle='#ff4444';X.fillRect(b.x+b.w/2+1,by-25,15,10+flagWave);
}else if(b.type==='kindergarten'){
X.beginPath();X.moveTo(b.x-3,by);X.lineTo(b.x+b.w/2,by-15);X.lineTo(b.x+b.w+3,by);X.closePath();
X.fillStyle=da>.3?'#FF6347':'#8B2500';X.fill();
}else{
// Flat roof for offices
X.fillStyle=da>.3?'#555':'#333';X.fillRect(b.x-2,by-3,b.w+4,3);
}

// Windows
const ww=8,wh=10,gap=4,marginX=6,marginY=8;
const cols=Math.floor((b.w-marginX*2)/(ww+gap));
const rows=b.floors;

for(let row=0;row<rows;row++){
for(let col=0;col<cols;col++){
const wx=b.x+marginX+col*(ww+gap);
const wy=by+marginY+row*(wh+gap+2);
if(wy+wh>GY-2)continue;

const lit=windowLit(b,row,col,hour);
if(lit){
const warmth=winHash(b.x,row,col,0);
const r=255,g=220+warmth*30|0,bb=150+warmth*50|0;
X.fillStyle=`rgba(${r},${g},${bb},.9)`;
X.fillRect(wx,wy,ww,wh);
// Glow
X.fillStyle=`rgba(${r},${g},${bb},.15)`;
X.fillRect(wx-3,wy-3,ww+6,wh+6);
}else{
X.fillStyle=da>.3?'rgba(150,200,255,.3)':'rgba(30,40,60,.8)';
X.fillRect(wx,wy,ww,wh);
}
// Window frame
X.strokeStyle=da>.3?'rgba(0,0,0,.2)':'rgba(0,0,0,.4)';
X.lineWidth=.5;X.strokeRect(wx,wy,ww,wh);
}}

// Door
const dw=12,dh=18;
X.fillStyle=da>.3?'#5C4033':'#3a2a1a';
X.fillRect(b.x+b.w/2-dw/2,GY-dh,dw,dh);

// Sign for commercial buildings
if(b.type==='shop'){
X.fillStyle='rgba(255,200,0,.9)';X.font='bold 7px sans-serif';X.textAlign='center';
X.fillText('SHOP',b.x+b.w/2,by-5);
}else if(b.type==='cafe'){
X.fillStyle='rgba(255,180,0,.9)';X.font='bold 7px sans-serif';X.textAlign='center';
X.fillText('CAFE',b.x+b.w/2,by-5);
}
}

function shadeColor(c,pct){
let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
r=Math.max(0,Math.min(255,r+r*pct|0));g=Math.max(0,Math.min(255,g+g*pct|0));b=Math.max(0,Math.min(255,b+b*pct|0));
return`rgb(${r},${g},${b})`;
}

// ── Park ──
function drawPark(da,hour){
const px=W*.44,pw=W*.12;
// Grass
X.fillStyle=da>.3?'#228B22':'#0a3a0a';
X.fillRect(px,GY-5,pw,8);

// Trees
const trees=[px+15,px+pw*.3,px+pw*.5,px+pw*.7,px+pw-15];
trees.forEach((tx,i)=>{
const th=30+i*5;
// Trunk
X.fillStyle=da>.3?'#8B4513':'#4a2a0a';
X.fillRect(tx-2,GY-th,4,th);
// Crown
X.beginPath();X.arc(tx,GY-th-10,14+i*2,0,6.28);
X.fillStyle=da>.3?`hsl(${110+i*10},60%,${30+i*5}%)`:'#0a2a0a';
X.fill();
});

// Bench
X.fillStyle=da>.3?'#8B6914':'#4a3a0a';
X.fillRect(px+pw*.4,GY-10,20,3);
X.fillRect(px+pw*.4+2,GY-7,2,7);
X.fillRect(px+pw*.4+16,GY-7,2,7);

// Playground
if(da>.3){
// Slide
X.strokeStyle='#FF6347';X.lineWidth=2;
X.beginPath();X.moveTo(px+pw*.15,GY-25);X.lineTo(px+pw*.25,GY);X.stroke();
X.beginPath();X.moveTo(px+pw*.15,GY-25);X.lineTo(px+pw*.15,GY);X.stroke();
// Swing
X.strokeStyle='#4169E1';
X.beginPath();X.moveTo(px+pw*.8,GY-22);X.lineTo(px+pw*.85,GY-22);X.stroke();
X.beginPath();X.moveTo(px+pw*.8,GY-22);X.lineTo(px+pw*.8,GY);X.stroke();
X.beginPath();X.moveTo(px+pw*.85,GY-22);X.lineTo(px+pw*.85,GY);X.stroke();
const swAngle=Math.sin(performance.now()/800)*.3;
X.beginPath();X.moveTo(px+pw*.825,GY-22);X.lineTo(px+pw*.825+Math.sin(swAngle)*8,GY-8);X.stroke();
}

// Fountain in center
X.fillStyle=da>.3?'#888':'#444';
X.fillRect(px+pw*.45,GY-8,pw*.1,8);
if(da>.3){
const ft=performance.now()/300;
for(let i=0;i<5;i++){
const fy=GY-8-Math.abs(Math.sin(ft+i*.5))*15;
X.beginPath();X.arc(px+pw*.5+Math.sin(ft+i)*3,fy,1.5,0,6.28);
X.fillStyle='rgba(100,180,255,.6)';X.fill();
}}

// Street lamp
X.fillStyle='#555';X.fillRect(px-5,GY-35,2,35);
X.beginPath();X.arc(px-4,GY-37,4,0,6.28);
if(da<.5){X.fillStyle='rgba(255,255,200,.8)';X.fill();
const lgl=X.createRadialGradient(px-4,GY-37,3,px-4,GY-37,30);lgl.addColorStop(0,'rgba(255,255,200,.2)');lgl.addColorStop(1,'rgba(255,255,200,0)');X.fillStyle=lgl;X.fillRect(px-34,GY-67,60,60);
}else{X.fillStyle='#888';X.fill()}

// Lamp on right side of park
const lx=px+pw+5;
X.fillStyle='#555';X.fillRect(lx,GY-35,2,35);
X.beginPath();X.arc(lx+1,GY-37,4,0,6.28);
if(da<.5){X.fillStyle='rgba(255,255,200,.8)';X.fill();
const lg2=X.createRadialGradient(lx+1,GY-37,3,lx+1,GY-37,30);lg2.addColorStop(0,'rgba(255,255,200,.2)');lg2.addColorStop(1,'rgba(255,255,200,0)');X.fillStyle=lg2;X.fillRect(lx-29,GY-67,60,60);
}else{X.fillStyle='#888';X.fill()}
}

// ── Road ──
function drawRoad(da){
// Main road
X.fillStyle=da>.3?'#555':'#2a2a2a';
X.fillRect(0,GY,W,H-GY);
// Sidewalk
X.fillStyle=da>.3?'#999':'#444';
X.fillRect(0,GY,W,4);
// Road markings
X.setLineDash([15,10]);X.strokeStyle=da>.3?'rgba(255,255,255,.4)':'rgba(255,255,255,.15)';
X.lineWidth=1;X.beginPath();X.moveTo(0,GY+12);X.lineTo(W,GY+12);X.stroke();X.setLineDash([]);
}

// ── People / Vehicles ──
const PEOPLE=[];
function initPeople(){
PEOPLE.length=0;
const types=['worker','student','parent_child','dog_walker','janitor','jogger','elderly','couple','delivery','teacher'];
for(let i=0;i<35;i++){
const type=types[i%types.length];
PEOPLE.push({
id:i,type,
homeX:W*.05+R()*W*.35, // residential side
destX:W*.55+R()*W*.35, // commercial side
x:W*.05+R()*W*.35,
y:GY+2,
speed:(.3+R()*.4)*(type==='jogger'?2:type==='elderly'?.5:type==='delivery'?1.5:1),
dir:1,size:5+R()*3,
color:`hsl(${R()*360},${40+R()*30}%,${40+R()*20}%)`,
hatColor:`hsl(${R()*360},${30+R()*40}%,${50+R()*30}%)`,
state:'home', // home, going_work, at_work, going_home, walking, sleeping
dogColor:type==='dog_walker'?`hsl(${R()*60+20},${50+R()*30}%,${30+R()*30}%)`:'',
childSize:type==='parent_child'?3+R()*2:0,
});
}
}
initPeople();

function getPersonSchedule(p,hour){
const h=hour;
switch(p.type){
case'janitor':
// Up at 5, sweeps 5:30-7, walks around residential 7-15, home 15+
if(h>=5&&h<5.5)return'going_work';if(h>=5.5&&h<7)return'sweeping';
if(h>=7&&h<15)return'walking';if(h>=15&&h<15.5)return'going_home';return'home';
case'dog_walker':
// Walk dog 6-7:30, 12-13, 18-19:30
if((h>=6&&h<7.5)||(h>=12&&h<13)||(h>=18&&h<19.5))return'walking';return'home';
case'jogger':
// Jog 5:30-7 and 19-20:30
if((h>=5.5&&h<7)||(h>=19&&h<20.5))return'jogging';return'home';
case'worker':
if(h>=7.5&&h<8.5)return'going_work';if(h>=8.5&&h<17.5)return'at_work';
if(h>=17.5&&h<18.5)return'going_home';if(h>=19&&h<20.5&&R()>.7)return'walking';return'home';
case'student':
if(h>=7&&h<8)return'going_work';if(h>=8&&h<14)return'at_work';
if(h>=14&&h<15)return'going_home';if(h>=15&&h<18)return'walking';return'home';
case'parent_child':
if(h>=7.5&&h<8.5)return'going_work';if(h>=8.5&&h<16)return'at_work';
if(h>=16&&h<17)return'going_home';if(h>=17&&h<18.5)return'walking';return'home';
case'teacher':
if(h>=7&&h<7.5)return'going_work';if(h>=7.5&&h<16)return'at_work';
if(h>=16&&h<16.5)return'going_home';return'home';
case'elderly':
if(h>=8&&h<11)return'walking';if(h>=15&&h<17)return'walking';return'home';
case'couple':
if(h>=8&&h<8.5)return'going_work';if(h>=8.5&&h<17)return'at_work';
if(h>=17&&h<17.5)return'going_home';if(h>=19&&h<21)return'walking';return'home';
case'delivery':
if(h>=9&&h<18)return'delivering';return'home';
default:return'home';
}
}

function updatePerson(p,hour){
const sched=getPersonSchedule(p,hour);
p.state=sched;
const spd=p.speed*(sched==='jogging'?2:1);

switch(sched){
case'going_work':
p.dir=p.destX>p.x?1:-1;
p.x+=p.dir*spd;
if(Math.abs(p.x-p.destX)<3)p.state='at_work';
break;
case'going_home':
p.dir=p.homeX>p.x?-1:1;
p.dir=p.homeX>p.x?1:-1;
p.x+=p.dir*spd;
if(Math.abs(p.x-p.homeX)<3)p.state='home';
break;
case'at_work':
p.x=p.destX;
break;
case'home':case'sleeping':
p.x=p.homeX;
break;
case'walking':case'jogging':case'sweeping':case'delivering':
p.x+=p.dir*spd;
if(p.x>W*.9){p.dir=-1}
if(p.x<W*.05){p.dir=1}
// Stay near home for walking, wider for delivering
if(sched==='delivering'){
if(p.x>W*.95)p.dir=-1;if(p.x<W*.05)p.dir=1;
}else if(sched==='sweeping'){
if(p.x>p.homeX+80)p.dir=-1;if(p.x<p.homeX-80)p.dir=1;
}else{
if(p.x>p.homeX+150)p.dir=-1;if(p.x<p.homeX-150)p.dir=1;
}
break;
}
p.x=Math.max(5,Math.min(W-5,p.x));
}

function drawPerson(p,da){
if(p.state==='home'||p.state==='sleeping'||p.state==='at_work')return;
const x=p.x,y=p.y,s=p.size;
const walkCycle=Math.sin(performance.now()/200+p.id*2)*2;

// Body
X.fillStyle=p.color;
X.fillRect(x-s/3,y-s*1.5,s*.66,s);

// Head
X.beginPath();X.arc(x,y-s*1.8,s*.4,0,6.28);X.fillStyle=`hsl(30,60%,${60+p.id%20}%)`;X.fill();

// Hat
X.fillStyle=p.hatColor;
X.fillRect(x-s*.5,y-s*2.2,s,s*.3);

// Legs (walking animation)
X.fillStyle=p.color;
X.fillRect(x-s*.25+walkCycle,y-s*.5,s*.2,s*.6);
X.fillRect(x+s*.05-walkCycle,y-s*.5,s*.2,s*.6);

// Dog for dog_walker
if(p.type==='dog_walker'&&p.dogColor){
const dx=x+p.dir*15,dy=y+2;
// Dog body
X.fillStyle=p.dogColor;
X.fillRect(dx-5,dy-4,10,5);
// Dog head
X.beginPath();X.arc(dx+p.dir*6,dy-4,3,0,6.28);X.fill();
// Leash
X.strokeStyle='#888';X.lineWidth=.5;X.beginPath();X.moveTo(x,y-s);X.lineTo(dx,dy-3);X.stroke();
// Tail
const tailWag=Math.sin(performance.now()/150)*20*Math.PI/180;
X.beginPath();X.moveTo(dx-p.dir*5,dy-4);X.lineTo(dx-p.dir*8,dy-8+Math.sin(tailWag)*3);X.stroke();
}

// Child for parent_child
if(p.type==='parent_child'&&p.childSize>0){
const cx=x-p.dir*12,cy=y+1,cs=p.childSize;
X.fillStyle=`hsl(${(p.id*50)%360},60%,60%)`;
X.fillRect(cx-cs/3,cy-cs*1.2,cs*.66,cs*.7);
X.beginPath();X.arc(cx,cy-cs*1.5,cs*.35,0,6.28);X.fillStyle=`hsl(30,60%,70%)`;X.fill();
// Legs
X.fillStyle=`hsl(${(p.id*50)%360},60%,60%)`;
X.fillRect(cx-cs*.2+walkCycle*.7,cy-cs*.5,cs*.18,cs*.5);
X.fillRect(cx+cs*.02-walkCycle*.7,cy-cs*.5,cs*.18,cs*.5);
// Holding hands
X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=.5;X.beginPath();X.moveTo(x-s*.3,y-s);X.lineTo(cx+cs*.3,cy-cs);X.stroke();
}

// Broom for janitor
if(p.type==='janitor'&&p.state==='sweeping'){
X.strokeStyle='#8B4513';X.lineWidth=1.5;
const ba=Math.sin(performance.now()/200)*.4;
X.beginPath();X.moveTo(x+p.dir*3,y-s);X.lineTo(x+p.dir*12+Math.sin(ba)*5,y+3);X.stroke();
X.strokeStyle='#DAA520';X.lineWidth=2;
X.beginPath();X.moveTo(x+p.dir*12+Math.sin(ba)*5-3,y+3);X.lineTo(x+p.dir*12+Math.sin(ba)*5+3,y+3);X.stroke();
}

// Delivery box
if(p.type==='delivery'){
X.fillStyle='#CD853F';X.fillRect(x+p.dir*5,y-s*1.8,s*.6,s*.5);
X.strokeStyle='#8B4513';X.lineWidth=.5;X.strokeRect(x+p.dir*5,y-s*1.8,s*.6,s*.5);
}
}

// ── Vehicles ──
const CARS=[];
function initCars(){
CARS.length=0;
for(let i=0;i<6;i++){
CARS.push({
x:R()*W,y:GY+10+R()*6,
speed:1+R()*1.5,dir:R()>.5?1:-1,
color:`hsl(${R()*360},${50+R()*30}%,${40+R()*20}%)`,
type:i<4?'car':'van',
active:false
});
}
}
initCars();

function updateCar(c,hour){
// Cars active 7-22
c.active=hour>=7&&hour<=22;
if(!c.active)return;
c.x+=c.dir*c.speed;
if(c.x>W+30)c.x=-30;
if(c.x<-30)c.x=W+30;
}

function drawCar(c,da){
if(!c.active)return;
const x=c.x,y=c.y,d=c.dir;
// Body
X.fillStyle=c.color;
if(c.type==='car'){
X.fillRect(x-12,y-8,24,8);
X.fillRect(x-8,y-14,16,6);
}else{
X.fillRect(x-15,y-12,30,12);
}
// Windows
X.fillStyle=da>.3?'rgba(150,200,255,.6)':'rgba(100,150,200,.4)';
if(c.type==='car'){X.fillRect(x-6,y-13,12,5)}
else{X.fillRect(x-12,y-11,8,6)}
// Wheels
X.fillStyle='#222';
X.beginPath();X.arc(x-8,y,3,0,6.28);X.fill();
X.beginPath();X.arc(x+8,y,3,0,6.28);X.fill();
// Headlights at night
if(da<.4){
X.fillStyle='rgba(255,255,200,.8)';
X.beginPath();X.arc(x+d*13,y-5,2,0,6.28);X.fill();
const hl=X.createRadialGradient(x+d*13,y-5,2,x+d*40,y-3,25);hl.addColorStop(0,'rgba(255,255,200,.15)');hl.addColorStop(1,'rgba(255,255,200,0)');
X.fillStyle=hl;X.fillRect(x+d*13-5,y-20,d*45,30);
}
}

// ── Birds ──
function drawBirds(da,hour){
if(da<.3||hour<6||hour>20)return;
const n=performance.now()/1e3;
for(let i=0;i<4;i++){
const bx=((n*20+i*200)%(W+100))-50;
const by=80+i*30+Math.sin(n+i*2)*20;
const wing=Math.sin(n*5+i*3)*8;
X.strokeStyle='rgba(0,0,0,.4)';X.lineWidth=1;
X.beginPath();X.moveTo(bx-8,by+wing);X.lineTo(bx,by);X.lineTo(bx+8,by+wing);X.stroke();
}
}

// ── Smoke from chimneys ──
function drawSmoke(da,hour){
if(hour<6||hour>22)return;
const n=performance.now()/1e3;
BLDGS.forEach(b=>{
if(b.type!=='cafe')return;
for(let i=0;i<3;i++){
const sx=b.x+b.w*.7;
const sy=GY-b.h-15-i*12-Math.sin(n+i)*5;
const sr=3+i*2;
X.beginPath();X.arc(sx+Math.sin(n*.5+i)*8,sy,sr,0,6.28);
X.fillStyle=`rgba(200,200,200,${.15-i*.04})`;X.fill();
}
});
}

// ── Weather (Open-Meteo API, no key needed) ──
let weather={temp:15,rain:0,snow:0,cloud:50,wind:5,code:0};
const rainDrops=Array.from({length:200},()=>({x:R()*1.2-.1,y:R(),sp:.02+R()*.03,len:5+R()*10}));
const snowFlakes=Array.from({length:150},()=>({x:R()*1.2-.1,y:R(),sp:.003+R()*.005,r:1+R()*2.5,drift:R()*6.28}));

async function fetchWeather(){
try{
// Moscow coordinates as default
const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.75&longitude=37.62&current=temperature_2m,rain,snowfall,cloud_cover,wind_speed_10m,weather_code&timezone=auto');
const d=await r.json();const c=d.current;
weather={temp:c.temperature_2m,rain:c.rain,snow:c.snowfall,cloud:c.cloud_cover,wind:c.wind_speed_10m,code:c.weather_code};
}catch(e){/* fallback to defaults */}
}
fetchWeather();setInterval(fetchWeather,600000); // every 10 min

function drawRain(da){
if(weather.rain<=0)return;
const intensity=Math.min(weather.rain*30,200);
const n=performance.now()/1e3;
const windOff=weather.wind*.3;
X.strokeStyle=`rgba(150,180,255,${Math.min(.3+weather.rain*.1,.6)})`;
X.lineWidth=1;
for(let i=0;i<intensity;i++){
const d=rainDrops[i%rainDrops.length];
const rx=(d.x*W+n*windOff*20+i*17)%W;
const ry=((d.y+n*d.sp*15+i*.07)%1)*GY;
X.beginPath();X.moveTo(rx,ry);X.lineTo(rx+windOff,ry+d.len);X.stroke();
}
// Puddles
if(weather.rain>1){
for(let i=0;i<8;i++){
const px=(i*W/8+30)%W;
X.beginPath();X.ellipse(px,GY+3,10+i*3,2,0,0,6.28);
X.fillStyle='rgba(100,140,180,.15)';X.fill();
}}
}

function drawSnow(da){
if(weather.snow<=0)return;
const intensity=Math.min(weather.snow*50,150);
const n=performance.now()/1e3;
for(let i=0;i<intensity;i++){
const s=snowFlakes[i%snowFlakes.length];
const sx=((s.x+Math.sin(n*.5+s.drift)*.03)*W+i*23)%W;
const sy=((s.y+n*s.sp+i*.05)%1)*GY;
X.beginPath();X.arc(sx,sy,s.r,0,6.28);
X.fillStyle=`rgba(255,255,255,${.4+s.r*.1})`;X.fill();
}
// Snow on ground
if(weather.snow>0.5){
X.fillStyle='rgba(240,240,255,.3)';
X.fillRect(0,GY-2,W,4);
}
}

function drawWeatherOverlay(da){
// Heavy clouds
if(weather.cloud>70){
const al=Math.min((weather.cloud-70)/60,.35);
X.fillStyle=`rgba(100,100,110,${al})`;X.fillRect(0,0,W,H*.5);
}
}

function drawWeatherInfo(da){
const tx=15,ty=25;
X.font='11px sans-serif';X.textAlign='left';
X.fillStyle=da>.5?'rgba(0,0,0,.4)':'rgba(255,255,255,.4)';
let desc='Clear';
const c=weather.code;
if(c<=3)desc=['Clear','Mostly clear','Partly cloudy','Overcast'][c];
else if(c>=51&&c<=67)desc='Rain';
else if(c>=71&&c<=77)desc='Snow';
else if(c>=80&&c<=82)desc='Showers';
else if(c>=95)desc='Thunderstorm';
else if(c>=45&&c<=48)desc='Fog';
X.fillText(`${weather.temp|0}\u00B0C \u00B7 ${desc} \u00B7 Wind ${weather.wind|0} km/h`,tx,ty);
}

// Umbrellas for people in rain
const origDrawPerson=drawPerson;
drawPerson=function(p,da){
origDrawPerson(p,da);
if(weather.rain>0.5&&p.state!=='home'&&p.state!=='sleeping'&&p.state!=='at_work'){
const x=p.x,y=p.y,s=p.size;
// Umbrella
X.strokeStyle='#555';X.lineWidth=1;X.beginPath();X.moveTo(x,y-s*2.2);X.lineTo(x,y-s*3.5);X.stroke();
X.beginPath();X.arc(x,y-s*3.5,s*1.2,Math.PI,0);
X.fillStyle=`hsl(${p.id*40%360},60%,50%)`;X.fill();
}
};

// ── Main render ──
function render(){
const now=new Date();
const hours=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
let da;
if(hours>=7&&hours<=17)da=1;
else if(hours>=5&&hours<7)da=(hours-5)/2;
else if(hours>17&&hours<=19)da=1-(hours-17)/2;
else da=0;

drawSky(da);
drawStars(1-da);
drawSun(hours);
drawMoon(hours);
drawClouds(da);

// Ground & road
drawRoad(da);

// Park
drawPark(da,hours);

// Buildings
BLDGS.forEach(b=>drawBuilding(b,hours,da));

// Smoke
drawSmoke(da,hours);

// Birds
drawBirds(da,hours);

// Update & draw people
PEOPLE.forEach(p=>{updatePerson(p,hours);drawPerson(p,da)});

// Update & draw cars
CARS.forEach(c=>{updateCar(c,hours);drawCar(c,da)});

// Weather effects
drawWeatherOverlay(da);
drawRain(da);
drawSnow(da);
drawWeatherInfo(da);

// Clock
const pad=n=>String(n).padStart(2,'0');
document.getElementById('clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
