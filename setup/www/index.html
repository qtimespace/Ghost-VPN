canvas{display:block}
#clock{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:1.2em;font-weight:300;letter-spacing:2px;text-shadow:0 0 8px rgba(0,0,0,.4);z-index:10}

<body>
<canvas id="c"></canvas>
<div id="clock"></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,GY;
// Forward declarations (initialized before first resize)
let BLDGS=[],PEOPLE=[],CARS=[],ANIMALS=[];
let weather={temp:15,rain:0,snow:0,cloud:50,wind:5,code:0};
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;GY=H*.78;initBuildings();initPeople();initCars();initAnimals()}
addEventListener('resize',resize);

// ── Utils ──
function lerp(a,b,t){return a+(b-a)*t}
function rng(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const R=rng(42);
function rr(a,b){return lerp(a,b,R())}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function shadeColor(c,pct){
let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
r=clamp(r+r*pct|0,0,255);g=clamp(g+g*pct|0,0,255);b=clamp(b+b*pct|0,0,255);
return`rgb(${r},${g},${b})`}

// ── Stars ──
const stars=Array.from({length:180},()=>({x:R(),y:R()*.7,r:R()*1.5+.3,tw:R()*6.28,sp:R()*.02+.005}));

// ── Moon phase ──
function moonPhase(d){let y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();if(m<3){y--;m+=12}let c=Math.floor(365.25*y),e=Math.floor(30.6001*(m+1)),j=c+e+day-694039.09;j/=29.5305882;return j-Math.floor(j)}

// ── Sky ──
function drawSky(da){
const g=X.createLinearGradient(0,0,0,H);
const dt=[135,206,235],db=[176,226,255],nt=[10,10,35],nb=[25,25,60],st=[255,100,50],sb=[255,180,100];
let t=[0,0,0],b=[0,0,0];
if(da>.6){const d=(da-.6)/.4;for(let i=0;i<3;i++){t[i]=lerp(st[i],dt[i],d);b[i]=lerp(sb[i],db[i],d)}}
else if(da>.2){const d=(da-.2)/.4;for(let i=0;i<3;i++){t[i]=lerp(nt[i],st[i],d);b[i]=lerp(nb[i],sb[i],d)}}
else{t=nt.slice();b=nb.slice()}
g.addColorStop(0,`rgb(${t[0]|0},${t[1]|0},${t[2]|0})`);
g.addColorStop(1,`rgb(${b[0]|0},${b[1]|0},${b[2]|0})`);
X.fillStyle=g;X.fillRect(0,0,W,H);
}

function drawStars(op){
if(op<.05)return;const n=performance.now()/1e3;
stars.forEach(s=>{const tw=.5+.5*Math.sin(n*s.sp*10+s.tw);X.beginPath();X.arc(s.x*W,s.y*H,s.r,0,6.28);X.fillStyle=`rgba(255,255,240,${op*tw})`;X.fill()});
}

function drawSun(h){
const sr=6,ss=18;if(h<sr||h>ss)return;
const p=(h-sr)/(ss-sr),a=Math.PI*p,x=W*(.1+.8*p),y=GY-Math.sin(a)*H*.55;
const gl=X.createRadialGradient(x,y,15,x,y,100);gl.addColorStop(0,'rgba(255,255,200,.5)');gl.addColorStop(1,'rgba(255,200,50,0)');X.fillStyle=gl;X.fillRect(x-100,y-100,200,200);
X.beginPath();X.arc(x,y,22,0,6.28);const sg=X.createRadialGradient(x-3,y-3,3,x,y,22);sg.addColorStop(0,'#fffde0');sg.addColorStop(1,'#ffcc33');X.fillStyle=sg;X.fill();
}

function drawMoon(h){
const ph=moonPhase(new Date()),mr=20-ph*3;let hh=h;if(hh<12)hh+=24;if(hh<mr||hh>mr+10)return;
const p=(hh-mr)/10,a=Math.PI*p,x=W*(.1+.8*p),y=GY-Math.sin(a)*H*.5,r=18;
const gl=X.createRadialGradient(x,y,10,x,y,60);gl.addColorStop(0,'rgba(200,220,255,.25)');gl.addColorStop(1,'rgba(200,220,255,0)');X.fillStyle=gl;X.fillRect(x-60,y-60,120,120);
X.beginPath();X.arc(x,y,r,0,6.28);X.fillStyle='#e8e8e0';X.fill();
X.save();X.beginPath();X.arc(x,y,r+1,0,6.28);X.clip();
X.beginPath();X.arc(x+Math.cos(ph*6.28)*r*1.2,y,r,0,6.28);X.fillStyle='rgba(10,10,35,.9)';X.fill();X.restore();
}

// ── Cloud shadows (subtle ground darkening) ──
function drawCloudShadows(da){
if(da<.4||weather.cloud<50)return;
const n=performance.now()/1e3;
const al=Math.min((weather.cloud-50)/200,.06);
for(let i=0;i<3;i++){
const sx=((n*(8+i*3)+i*500)%(W+400))-200;
X.save();
X.globalAlpha=al;
X.fillStyle='#000';
X.beginPath();X.ellipse(sx,GY+2,60+i*15,4+i,0,0,6.28);X.fill();
X.restore();
}}

function drawClouds(da){
const n=performance.now()/1e3,al=da>.3?.12:.04;
for(let i=0;i<5;i++){const cx=((n*(6+i*2)+i*300)%(W+300))-150,cy=50+i*45+Math.sin(n*.15+i)*8;
X.fillStyle=`rgba(255,255,255,${al})`;for(let j=0;j<4;j++){X.beginPath();X.arc(cx+j*22,cy+Math.sin(j)*4,16+j*4,0,6.28);X.fill()}}
}

// ── Buildings ──
function initBuildings(){
BLDGS.length=0;
const resX=W*.02,comX=W*.56;
const apts=[
{x:resX,w:55,h:120,floors:5,color:'#8B7355',type:'apt'},
{x:resX+65,w:45,h:90,floors:4,color:'#9C8B6E',type:'apt'},
{x:resX+120,w:60,h:140,floors:6,color:'#7A6B5D',type:'apt'},
{x:resX+190,w:50,h:100,floors:4,color:'#8E7F6F',type:'apt'},
{x:resX+250,w:55,h:130,floors:5,color:'#85776A',type:'apt'},
{x:resX+315,w:35,h:45,floors:2,color:'#A0522D',type:'house'},
{x:resX+358,w:38,h:50,floors:2,color:'#CD853F',type:'house'},
];
const coms=[
{x:comX,w:70,h:60,floors:2,color:'#4682B4',type:'school'},
{x:comX+80,w:55,h:50,floors:2,color:'#5F9EA0',type:'kindergarten'},
{x:comX+145,w:80,h:110,floors:4,color:'#708090',type:'office'},
{x:comX+235,w:65,h:90,floors:3,color:'#778899',type:'office'},
{x:comX+310,w:50,h:40,floors:1,color:'#6B8E23',type:'shop'},
{x:comX+370,w:45,h:55,floors:2,color:'#B8860B',type:'cafe'},
];
apts.forEach(b=>BLDGS.push({...b,side:'left'}));
coms.forEach(b=>BLDGS.push({...b,side:'right'}));
// Per-window state: curtain open/close, TV flicker, silhouette
BLDGS.forEach(b=>{
b.winStates=[];
const ww=8,gap=4,mx=6;
const cols=Math.floor((b.w-mx*2)/(ww+gap));
for(let row=0;row<b.floors;row++){
b.winStates[row]=[];
for(let col=0;col<cols;col++){
b.winStates[row][col]={
curtainOpen:R()>.2,
curtainAnim:0,
hasTV:R()>.7,
hasSilhouette:R()>.6,
tvFlicker:R()*6.28
};
}}});
}

function winHash(bx,floor,col,slot){
let h=(bx*397+floor*113+col*59+slot*7919)|0;
h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;
return(h&0xffff)/0xffff;
}

function windowLit(bldg,floor,col,hour){
const t=bldg.type;
const slot=Math.floor(hour*4);
const r=winHash(bldg.x,floor,col,slot);
// Stricter daytime: much fewer lit windows
if(t==='school'||t==='kindergarten'){return hour>=7.5&&hour<=17?r>.2:false}
if(t==='office'){return hour>=8&&hour<=20?r>.15:hour>=20&&hour<=22?r>.7:false}
if(t==='shop'){return hour>=9&&hour<=21?r>.1:false}
if(t==='cafe'){return hour>=7&&hour<=23?r>.15:hour>=23||hour<=1?r>.6:false}
if(t==='apt'||t==='house'){
if(hour>=23||hour<5)return r>.75;
if(hour>=5&&hour<7)return r>.5;
if(hour>=7&&hour<9)return r>.55;
if(hour>=9&&hour<17)return r>.85; // daytime: very few lit
if(hour>=17&&hour<20)return r>.2;
if(hour>=20&&hour<23)return r>.25;
}
return r>.5;
}

function drawBuilding(b,hour,da){
const by=GY-b.h,n=performance.now()/1e3;
// Building body
X.fillStyle=da>.3?b.color:shadeColor(b.color,-.4);
X.fillRect(b.x,by,b.w,b.h);
// Roof
if(b.type==='house'){
X.beginPath();X.moveTo(b.x-5,by);X.lineTo(b.x+b.w/2,by-20);X.lineTo(b.x+b.w+5,by);X.closePath();
X.fillStyle=da>.3?'#8B4513':'#4a2a0a';X.fill();
}else if(b.type==='school'){
X.fillStyle='#666';X.fillRect(b.x+b.w/2-1,by-25,2,25);
const flagWave=Math.sin(n*2+weather.wind*.3)*3;
X.fillStyle='#ff4444';X.fillRect(b.x+b.w/2+1,by-25,15,10+flagWave);
}else if(b.type==='kindergarten'){
X.beginPath();X.moveTo(b.x-3,by);X.lineTo(b.x+b.w/2,by-15);X.lineTo(b.x+b.w+3,by);X.closePath();
X.fillStyle=da>.3?'#FF6347':'#8B2500';X.fill();
}else{
X.fillStyle=da>.3?'#555':'#333';X.fillRect(b.x-2,by-3,b.w+4,3);
}
// Windows
const ww=8,wh=10,gap=4,marginX=6,marginY=8;
const cols=Math.floor((b.w-marginX*2)/(ww+gap));
for(let row=0;row<b.floors;row++){
for(let col=0;col<cols;col++){
const wx=b.x+marginX+col*(ww+gap);
const wy=by+marginY+row*(wh+gap+2);
if(wy+wh>GY-20)continue; // leave space for door
const ws=b.winStates[row]?b.winStates[row][col]:null;
const lit=windowLit(b,row,col,hour);
if(lit&&ws){
const warmth=winHash(b.x,row,col,0);
let r=255,g=220+warmth*30|0,bb=150+warmth*50|0;
// TV flicker
if(ws.hasTV&&hour>=19||hour<2){
const flick=.8+.2*Math.sin(n*8+ws.tvFlicker)*Math.sin(n*13+ws.tvFlicker);
r=lerp(100,200,flick)|0;g=lerp(120,200,flick)|0;bb=lerp(180,255,flick)|0;
}
// Window glow (smooth fade)
const glowAl=.7+.2*Math.sin(n*.5+row+col);
X.fillStyle=`rgba(${r},${g},${bb},${glowAl})`;
X.fillRect(wx,wy,ww,wh);
// Glow halo
X.fillStyle=`rgba(${r},${g},${bb},.1)`;
X.fillRect(wx-3,wy-3,ww+6,wh+6);
// Silhouette (evening/night)
if(ws.hasSilhouette&&(hour>=19||hour<6)&&lit){
X.fillStyle='rgba(0,0,0,.3)';
X.fillRect(wx+2,wy+3,3,5);X.beginPath();X.arc(wx+3.5,wy+2,2,0,6.28);X.fill();
}
// Curtain animation
if(!ws.curtainOpen){
X.fillStyle=da>.3?'rgba(180,160,140,.7)':'rgba(80,70,60,.8)';
X.fillRect(wx,wy,ww,wh);
}
}else{
X.fillStyle=da>.3?'rgba(150,200,255,.3)':'rgba(30,40,60,.8)';
X.fillRect(wx,wy,ww,wh);
}
X.strokeStyle=da>.3?'rgba(0,0,0,.2)':'rgba(0,0,0,.4)';
X.lineWidth=.5;X.strokeRect(wx,wy,ww,wh);
}}
// Door (drawn OVER building, below windows)
const dw=12,dh=18;
X.fillStyle=da>.3?'#5C4033':'#3a2a1a';
X.fillRect(b.x+b.w/2-dw/2,GY-dh,dw,dh);
// Door handle
X.fillStyle='#DAA520';X.beginPath();X.arc(b.x+b.w/2+3,GY-9,1.5,0,6.28);X.fill();
// Signs
if(b.type==='shop'){
X.fillStyle='rgba(255,200,0,.9)';X.font='bold 7px sans-serif';X.textAlign='center';
X.fillText('SHOP',b.x+b.w/2,by-5);
}else if(b.type==='cafe'){
X.fillStyle='rgba(255,180,0,.9)';X.font='bold 7px sans-serif';X.textAlign='center';
X.fillText('CAFE',b.x+b.w/2,by-5);
}
// Chimney smoke (cafe, or all buildings in cold weather)
if(b.type==='cafe'||(weather.temp<5&&(b.type==='apt'||b.type==='house'))){
const intensity=weather.temp<0?1.5:1;
for(let i=0;i<4;i++){
const sx=b.x+b.w*.7;
const sy=GY-b.h-15-i*12*intensity-Math.sin(n+i)*5;
const sr=(3+i*2)*intensity;
X.beginPath();X.arc(sx+Math.sin(n*.5+i)*8,sy,sr,0,6.28);
X.fillStyle=`rgba(200,200,200,${.15-i*.03})`;X.fill();
}}
}

// ── Curtain schedule (open/close transitions) ──
function updateCurtains(hour){
const n=performance.now()/1e3;
BLDGS.forEach(b=>{
b.winStates.forEach((row,ri)=>row.forEach((ws,ci)=>{
const shouldOpen=(hour>=7&&hour<22);
if(shouldOpen&&!ws.curtainOpen&&R()>.99)ws.curtainOpen=true;
if(!shouldOpen&&ws.curtainOpen&&R()>.995)ws.curtainOpen=false;
// Random TV flicker speed change
if(R()>.999)ws.tvFlicker=Math.random()*6.28;
}));
});
}

// ── Park ──
function drawPark(da,hour){
const px=W*.44,pw=W*.12,n=performance.now()/1e3;
// Grass
X.fillStyle=da>.3?'#228B22':'#0a3a0a';
X.fillRect(px,GY-5,pw,8);
// Trees (sway with wind)
const trees=[px+15,px+pw*.3,px+pw*.5,px+pw*.7,px+pw-15];
trees.forEach((tx,i)=>{
const th=30+i*5;
const sway=Math.sin(n*1.5+i)*(weather.wind*.15);
X.fillStyle=da>.3?'#8B4513':'#4a2a0a';
X.save();X.translate(tx,GY);X.rotate(sway*Math.PI/180);
X.fillRect(-2,-th,4,th);
X.beginPath();X.arc(0,-th-10,14+i*2,0,6.28);
X.fillStyle=da>.3?`hsl(${110+i*10},60%,${30+i*5}%)`:'#0a2a0a';X.fill();
X.restore();
});
// Bench
X.fillStyle=da>.3?'#8B6914':'#4a3a0a';
X.fillRect(px+pw*.4,GY-10,20,3);
X.fillRect(px+pw*.4+2,GY-7,2,7);
X.fillRect(px+pw*.4+16,GY-7,2,7);
// Reader on bench (daytime)
if(da>.3&&hour>=10&&hour<16){
const rx=px+pw*.4+10,ry=GY-10;
X.fillStyle='#6B4226';X.fillRect(rx-2,ry-8,4,6);
X.beginPath();X.arc(rx,ry-10,3,0,6.28);X.fillStyle='#DEB887';X.fill();
// Book
X.fillStyle='#fff';X.fillRect(rx+2,ry-6,4,3);
}
// Playground
if(da>.3){
// Slide
X.strokeStyle='#FF6347';X.lineWidth=2;
X.beginPath();X.moveTo(px+pw*.15,GY-25);X.lineTo(px+pw*.25,GY);X.stroke();
X.beginPath();X.moveTo(px+pw*.15,GY-25);X.lineTo(px+pw*.15,GY);X.stroke();
// Kid on slide (afternoon)
if(hour>=14&&hour<18){
const kp=((n*.3)%1);
const kx=lerp(px+pw*.15,px+pw*.25,kp);
const ky=lerp(GY-25,GY-2,kp);
X.fillStyle='#FF6B6B';X.fillRect(kx-2,ky-5,4,4);
X.beginPath();X.arc(kx,ky-7,2.5,0,6.28);X.fillStyle='#FDBCB4';X.fill();
}
// Swing
X.strokeStyle='#4169E1';X.lineWidth=1.5;
X.beginPath();X.moveTo(px+pw*.8,GY-22);X.lineTo(px+pw*.85,GY-22);X.stroke();
X.beginPath();X.moveTo(px+pw*.8,GY-22);X.lineTo(px+pw*.8,GY);X.stroke();
X.beginPath();X.moveTo(px+pw*.85,GY-22);X.lineTo(px+pw*.85,GY);X.stroke();
const swAngle=Math.sin(n*.8)*.3;
X.beginPath();X.moveTo(px+pw*.825,GY-22);X.lineTo(px+pw*.825+Math.sin(swAngle)*8,GY-8);X.stroke();
// Ball (rolls around sometimes)
const ballPhase=(n*.15)%20;
if(ballPhase<5){
const bx=px+pw*.3+ballPhase*8,bby=GY-4+Math.abs(Math.sin(ballPhase*3))*3;
X.beginPath();X.arc(bx,bby,3,0,6.28);X.fillStyle='#FF4500';X.fill();
X.strokeStyle='#fff';X.lineWidth=.5;X.beginPath();X.moveTo(bx-2,bby);X.lineTo(bx+2,bby);X.stroke();
}
}
// Fountain
X.fillStyle=da>.3?'#888':'#444';
X.fillRect(px+pw*.45,GY-8,pw*.1,8);
if(da>.3){
const ft=n*3;
for(let i=0;i<5;i++){
const fy=GY-8-Math.abs(Math.sin(ft+i*.5))*15;
X.beginPath();X.arc(px+pw*.5+Math.sin(ft+i)*3,fy,1.5,0,6.28);
X.fillStyle='rgba(100,180,255,.6)';X.fill();
}
// Person taking photo at fountain (random moments)
if(Math.floor(n/30)%3===0&&hour>=10&&hour<19){
const phx=px+pw*.5+12,phy=GY+1;
X.fillStyle='#4169E1';X.fillRect(phx-2,phy-8,4,6);
X.beginPath();X.arc(phx,phy-10,2.5,0,6.28);X.fillStyle='#FDBCB4';X.fill();
// Phone
X.fillStyle='#333';X.fillRect(phx+3,phy-8,2,3);
}
}
// Street lamps
[px-5,px+pw+5].forEach((lx,li)=>{
X.fillStyle='#555';X.fillRect(lx,GY-35,2,35);
X.beginPath();X.arc(lx+1,GY-37,4,0,6.28);
if(da<.5){X.fillStyle='rgba(255,255,200,.8)';X.fill();
const lgl=X.createRadialGradient(lx+1,GY-37,3,lx+1,GY-37,30);lgl.addColorStop(0,'rgba(255,255,200,.2)');lgl.addColorStop(1,'rgba(255,255,200,0)');X.fillStyle=lgl;X.fillRect(lx-29,GY-67,60,60);
}else{X.fillStyle='#888';X.fill()}
});
}

// ── Road ──
function drawRoad(da){
X.fillStyle=da>.3?'#555':'#2a2a2a';
X.fillRect(0,GY,W,H-GY);
// Sidewalk
X.fillStyle=da>.3?'#999':'#444';

// ── Speed System ──
const BASE_SPEED={worker:1.0,student:1.1,parent_child:.9,dog_walker:.85,janitor:.8,jogger:1.8,elderly:.6,couple:.9,delivery:1.4,teacher:1.0,cyclist:2.2};
const MOODS=['calm','rushed','tired','happy'];
function timeOfDayFactor(hour){
if(hour>=7&&hour<9)return 1.2;
if(hour>=17&&hour<19)return 1.1;
if(hour>=23||hour<5)return .7;
return 1.0;
}
function weatherSpeedFactor(){
let f=1;
if(weather.rain>0)f*=.85;
if(weather.snow>0)f*=.75;
if(weather.wind>30)f*=.9;
return f;
}
function moodFactor(mood){
return{calm:.9,rushed:1.2,tired:.8,happy:1.0}[mood]||1;
}
function calcSpeed(p,hour){
const base=BASE_SPEED[p.type]||1;
const tod=timeOfDayFactor(hour);
const wf=weatherSpeedFactor();
const mf=moodFactor(p.mood);
const rand=.85+p.speedRand*.3;
return base*tod*wf*mf*rand*.5;
}

// ── Micro Events ──
function checkMicroEvent(p,n){
if(p.microEvent)return;
if(n-p.lastEventTime<20)return;
if(Math.random()>.005)return; // ~every 30-60 sec per person
const events=['phone','shoelace','look_sky','talk','shelter'];
let ev=events[Math.floor(Math.random()*events.length)];
// Context-sensitive
if(weather.rain>0&&Math.random()>.5)ev='shelter';
if(p.type==='delivery'&&Math.random()>.5)ev='search_address';
if(p.type==='elderly'&&Math.random()>.3)ev='sit_bench';
if(p.type==='parent_child'&&Math.random()>.4)ev='child_runs';
p.microEvent=ev;
p.microEventStart=n;
p.microEventDuration=3+Math.random()*6;
}
function processMicroEvent(p,n){
if(!p.microEvent)return false;
if(n-p.microEventStart>p.microEventDuration){
p.microEvent=null;p.lastEventTime=n;
return false;
}
return true; // true = person is stopped/busy
}

// ── People ──
function initPeople(){
PEOPLE.length=0;
const types=['worker','student','parent_child','dog_walker','janitor','jogger','elderly','couple','delivery','teacher'];
for(let i=0;i<40;i++){
const type=types[i%types.length];
// Time offset: each NPC has +-30min schedule shift
const timeOffset=(R()-.5)*.5;
PEOPLE.push({
id:i,type,
homeX:W*.05+R()*W*.35,
destX:W*.55+R()*W*.35,
x:W*.05+R()*W*.35,
y:GY+2,
speedRand:R(),
dir:1,size:5+R()*3,
color:`hsl(${R()*360},${40+R()*30}%,${40+R()*20}%)`,
hatColor:`hsl(${R()*360},${30+R()*40}%,${50+R()*30}%)`,
state:'home',
mood:MOODS[Math.floor(R()*4)],
timeOffset,
dogColor:type==='dog_walker'?`hsl(${R()*60+20},${50+R()*30}%,${30+R()*30}%)`:'',
childSize:type==='parent_child'?3+R()*2:0,
microEvent:null,microEventStart:0,microEventDuration:0,lastEventTime:0,
// For crossing: waiting at traffic light
waitingAtLight:false,
});
}
}

function getPersonSchedule(p,hour){
const h=hour+p.timeOffset; // Apply personal time offset
switch(p.type){
case'janitor':
if(h>=5&&h<5.5)return'going_work';if(h>=5.5&&h<7)return'sweeping';
if(h>=7&&h<15)return'walking';if(h>=15&&h<15.5)return'going_home';return'home';
case'dog_walker':
if((h>=6&&h<7.5)||(h>=12&&h<13)||(h>=18&&h<19.5))return'walking';return'home';
case'jogger':
if((h>=5.5&&h<7)||(h>=19&&h<20.5))return'jogging';return'home';
case'worker':
if(h>=7.5&&h<8.5)return'going_work';if(h>=8.5&&h<17.5)return'at_work';
if(h>=17.5&&h<18.5)return'going_home';if(h>=19&&h<20.5&&R()>.7)return'walking';return'home';
case'student':
if(h>=7&&h<8)return'going_work';if(h>=8&&h<14)return'at_work';
if(h>=14&&h<15)return'going_home';if(h>=15&&h<18)return'walking';return'home';
case'parent_child':
if(h>=7.5&&h<8.5)return'going_work';if(h>=8.5&&h<16)return'at_work';
if(h>=16&&h<17)return'going_home';if(h>=17&&h<18.5)return'walking';return'home';
case'teacher':
if(h>=7&&h<7.5)return'going_work';if(h>=7.5&&h<16)return'at_work';
if(h>=16&&h<16.5)return'going_home';return'home';
case'elderly':
if(h>=8&&h<11)return'walking';if(h>=15&&h<17)return'walking';return'home';
case'couple':
if(h>=8&&h<8.5)return'going_work';if(h>=8.5&&h<17)return'at_work';
if(h>=17&&h<17.5)return'going_home';if(h>=19&&h<21)return'walking';return'home';
case'delivery':
if(h>=9&&h<18)return'delivering';return'home';
default:return'home';
}
}

function updatePerson(p,hour){
const n=performance.now()/1e3;
const sched=getPersonSchedule(p,hour);
p.state=sched;
// Check micro events for active people
if(sched!=='home'&&sched!=='sleeping'&&sched!=='at_work'){
checkMicroEvent(p,n);
if(processMicroEvent(p,n))return; // frozen during event
}
const spd=calcSpeed(p,hour)*(sched==='jogging'?2:1);
// Traffic light awareness (near crosswalk)
const cwx=W*.43;
if(Math.abs(p.x-cwx)<15&&isTrafficRed()&&(sched==='going_work'||sched==='going_home')){
p.waitingAtLight=true;return;
}
p.waitingAtLight=false;
switch(sched){
case'going_work':
p.dir=p.destX>p.x?1:-1;p.x+=p.dir*spd;
if(Math.abs(p.x-p.destX)<3)p.state='at_work';break;
case'going_home':
p.dir=p.homeX>p.x?1:-1;p.x+=p.dir*spd;
if(Math.abs(p.x-p.homeX)<3)p.state='home';break;
case'at_work':p.x=p.destX;break;
case'home':case'sleeping':p.x=p.homeX;break;
case'walking':case'jogging':case'sweeping':case'delivering':
p.x+=p.dir*spd;
if(p.x>W*.9)p.dir=-1;if(p.x<W*.05)p.dir=1;
if(sched==='delivering'){if(p.x>W*.95)p.dir=-1;if(p.x<W*.05)p.dir=1}
else if(sched==='sweeping'){if(p.x>p.homeX+80)p.dir=-1;if(p.x<p.homeX-80)p.dir=1}
else{if(p.x>p.homeX+150)p.dir=-1;if(p.x<p.homeX-150)p.dir=1}
break;
}
p.x=clamp(p.x,5,W-5);
}

function drawPerson(p,da){
if(p.state==='home'||p.state==='sleeping'||p.state==='at_work')return;
const x=p.x,y=p.y,s=p.size,n=performance.now()/1e3;
const isMoving=!p.microEvent&&!p.waitingAtLight;
const walkCycle=isMoving?Math.sin(n*4+p.id*2)*2:0;
// Wind lean
const lean=weather.wind>15?Math.sin(weather.wind*.05)*2:0;
X.save();X.translate(x,y);X.rotate(lean*Math.PI/180);
// Body
X.fillStyle=p.color;X.fillRect(-s/3,-s*1.5,s*.66,s);
// Head
X.beginPath();X.arc(0,-s*1.8,s*.4,0,6.28);X.fillStyle=`hsl(30,60%,${60+p.id%20}%)`;X.fill();
// Hat
X.fillStyle=p.hatColor;X.fillRect(-s*.5,-s*2.2,s,s*.3);
// Legs
X.fillStyle=p.color;
X.fillRect(-s*.25+walkCycle,-s*.5,s*.2,s*.6);
X.fillRect(s*.05-walkCycle,-s*.5,s*.2,s*.6);
X.restore();
// Micro event visuals
if(p.microEvent==='phone'){
X.fillStyle='#333';X.fillRect(x+p.dir*4,y-s*1.3,2,3);
}else if(p.microEvent==='search_address'){
// Spinning delivery person
const spin=Math.sin(n*3)*3;
X.save();X.translate(x,y);X.rotate(spin*.1);
X.fillStyle='#ff0';X.font='6px sans-serif';X.textAlign='center';X.fillText('?',0,-s*2.8);
X.restore();
}else if(p.microEvent==='child_runs'&&p.type==='parent_child'){
const cx=x+p.dir*25+Math.sin(n*5)*5,cy=y;
X.fillStyle='#FF6B6B';X.fillRect(cx-2,cy-6,4,4);
X.beginPath();X.arc(cx,cy-8,2.5,0,6.28);X.fillStyle='#FDBCB4';X.fill();
}
// Dog
if(p.type==='dog_walker'&&p.dogColor){
const dx=x+p.dir*15,dy=y+2;
X.fillStyle=p.dogColor;X.fillRect(dx-5,dy-4,10,5);
X.beginPath();X.arc(dx+p.dir*6,dy-4,3,0,6.28);X.fill();
X.strokeStyle='#888';X.lineWidth=.5;X.beginPath();X.moveTo(x,y-s);X.lineTo(dx,dy-3);X.stroke();
const tailWag=Math.sin(n*10)*.5;
X.beginPath();X.moveTo(dx-p.dir*5,dy-4);X.lineTo(dx-p.dir*8,dy-8+Math.sin(tailWag)*3);X.stroke();
}
// Child
if(p.type==='parent_child'&&p.childSize>0&&p.microEvent!=='child_runs'){
const cx=x-p.dir*12,cy=y+1,cs=p.childSize;
X.fillStyle=`hsl(${(p.id*50)%360},60%,60%)`;
X.fillRect(cx-cs/3,cy-cs*1.2,cs*.66,cs*.7);
X.beginPath();X.arc(cx,cy-cs*1.5,cs*.35,0,6.28);X.fillStyle='hsl(30,60%,70%)';X.fill();
X.fillStyle=`hsl(${(p.id*50)%360},60%,60%)`;
X.fillRect(cx-cs*.2+walkCycle*.7,cy-cs*.5,cs*.18,cs*.5);
X.fillRect(cx+cs*.02-walkCycle*.7,cy-cs*.5,cs*.18,cs*.5);
X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=.5;X.beginPath();X.moveTo(x-s*.3,y-s);X.lineTo(cx+cs*.3,cy-cs);X.stroke();
}
// Broom
if(p.type==='janitor'&&p.state==='sweeping'){
X.strokeStyle='#8B4513';X.lineWidth=1.5;const ba=Math.sin(n*3)*.4;
X.beginPath();X.moveTo(x+p.dir*3,y-s);X.lineTo(x+p.dir*12+Math.sin(ba)*5,y+3);X.stroke();
X.strokeStyle='#DAA520';X.lineWidth=2;
X.beginPath();X.moveTo(x+p.dir*12+Math.sin(ba)*5-3,y+3);X.lineTo(x+p.dir*12+Math.sin(ba)*5+3,y+3);X.stroke();
}
// Delivery box
if(p.type==='delivery'){
X.fillStyle='#CD853F';X.fillRect(x+p.dir*5,y-s*1.8,s*.6,s*.5);
X.strokeStyle='#8B4513';X.lineWidth=.5;X.strokeRect(x+p.dir*5,y-s*1.8,s*.6,s*.5);
}
// Umbrella in rain
if(weather.rain>0.5&&p.state!=='home'&&p.state!=='sleeping'&&p.state!=='at_work'){
X.strokeStyle='#555';X.lineWidth=1;X.beginPath();X.moveTo(x,y-s*2.2);X.lineTo(x,y-s*3.5);X.stroke();
X.beginPath();X.arc(x,y-s*3.5,s*1.2,Math.PI,0);
X.fillStyle=`hsl(${p.id*40%360},60%,50%)`;X.fill();
}
// Snow careful walk
if(weather.snow>0&&isMoving){
// Footprints in snow
if(Math.floor(n*4)%2===0){
X.fillStyle='rgba(100,100,120,.15)';
X.beginPath();X.ellipse(x-2,y+2,2,1,0,0,6.28);X.fill();
}
}
}

function updateCar(c,hour){
const n=performance.now()/1e3;
if(c.type==='bus'){
c.active=hour>=6&&hour<=23;
if(!c.active)return;
if(c.atStop){
c.stopTimer-=1/60;
if(c.stopTimer<=0){c.atStop=false}
return;
}
c.x+=c.dir*c.speed*(weather.rain>0?.7:1);
if(Math.abs(c.x-c.stopX)<5&&!c.atStop){c.atStop=true;c.stopTimer=4;c.x=c.stopX}
if(c.x>W+60){c.x=-60;c.dir=1}
if(c.x<-60){c.x=W+60;c.dir=-1}
return;
}
if(c.type==='taxi'){
c.active=hour>=7&&hour<=1;
if(!c.active)return;
if(c.stopping){c.stopTimer-=1/60;if(c.stopTimer<=0)c.stopping=false;return}
c.x+=c.dir*c.speed;
if(Math.random()<.0005){c.stopping=true;c.stopTimer=3+Math.random()*4}
if(c.x>W+30)c.x=-30;if(c.x<-30)c.x=W+30;
return;
}
if(c.type==='cyclist'){
c.active=hour>=6&&hour<=21&&weather.rain<1&&weather.snow<.5;
if(!c.active)return;
c.x+=c.dir*c.speed;
if(c.x>W+20)c.x=-20;if(c.x<-20)c.x=W+20;
return;
}
c.active=hour>=7&&hour<=22;
if(!c.active)return;
c.x+=c.dir*c.speed*(weather.rain>0?.8:1)*(weather.snow>0?.6:1);
if(c.x>W+30)c.x=-30;if(c.x<-30)c.x=W+30;
}

function drawCar(c,da){
if(!c.active)return;
const x=c.x,y=c.y,d=c.dir;
if(c.type==='bus'){
// Bus body
X.fillStyle=c.color;X.fillRect(x-25,y-14,50,14);

}

X.fillRect(x-6,y-13,12,5);

if(da<.4){X.fillStyle='rgba(255,255,200,.8)';X.beginPath();X.arc(x+d*13,y-5,2,0,6.28);X.fill()}

X.fillStyle='rgba(255,0,0,.6)';X.beginPath();X.arc(x-d*12,y-5,1.5,0,6.28);X.fill();

const hl=X.createRadialGradient(x+d*13,y-5,2,x+d*40,y-3,25);hl.addColorStop(0,'rgba(255,255,200,.15)');hl.addColorStop(1,'rgba(255,255,200,0)');

}
}

visible:true});
}
}

function updateAnimals(hour,n){
ANIMALS.forEach(a=>{
if(a.type==='cat'){
a.stateTimer-=1/60;
if(a.stateTimer<=0){
const states=['sitting','walking','running','hiding'];
a.state=states[Math.floor(Math.random()*states.length)];
a.stateTimer=5+Math.random()*20;
a.visible=Math.random()>.2;
}
if(a.state==='walking'){a.x+=a.dir*a.speed;if(a.x>W*.95||a.x<W*.05)a.dir*=-1}
if(a.state==='running'){a.x+=a.dir*a.speed*3;if(a.x>W*.95||a.x<W*.05)a.dir*=-1}
}
if(a.type==='pigeon'){
// Check if person is near
const nearPerson=PEOPLE.some(p=>p.state!=='home'&&p.state!=='at_work'&&Math.abs(p.x-a.x)<20);
if(nearPerson&&!a.flyAway){a.flyAway=true;a.flyTimer=2;a.dx=(Math.random()-.5)*3;a.dy=-2-Math.random()*2}
if(a.flyAway){
a.x+=a.dx;a.y+=a.dy;a.dy+=.03;a.flyTimer-=1/60;
if(a.flyTimer<=0){a.flyAway=false;a.x=a.baseX+(Math.random()-.5)*30;a.y=GY-1-Math.random()*3;a.dx=0;a.dy=0}
}else{
a.pecking=Math.sin(n*3+a.baseX)>.3;
a.x+=Math.sin(n*.5+a.baseX)*.1; // slight drift
}
}
});
}

function drawAnimals(da){
ANIMALS.forEach(a=>{
if(!a.visible)return;
if(a.type==='cat'){
const x=a.x,y=a.y;
if(a.state==='hiding')return;
// Body
X.fillStyle=a.color;X.fillRect(x-5,y-4,10,4);
// Head
X.beginPath();X.arc(x+a.dir*6,y-5,3,0,6.28);X.fill();
// Ears
X.beginPath();X.moveTo(x+a.dir*5,y-7);X.lineTo(x+a.dir*4,y-11);X.lineTo(x+a.dir*7,y-7);X.fill();
X.beginPath();X.moveTo(x+a.dir*7,y-7);X.lineTo(x+a.dir*8,y-11);X.lineTo(x+a.dir*9,y-7);X.fill();
// Tail
const tailCurve=Math.sin(performance.now()/500)*.5;
X.strokeStyle=a.color;X.lineWidth=1.5;
X.beginPath();X.moveTo(x-a.dir*5,y-3);
X.quadraticCurveTo(x-a.dir*10,y-10+tailCurve*5,x-a.dir*8,y-12);X.stroke();
// Eyes
X.fillStyle=da>.3?'#2a2':'#ff0';
X.beginPath();X.arc(x+a.dir*5,y-6,1,0,6.28);X.fill();
X.beginPath();X.arc(x+a.dir*7,y-6,1,0,6.28);X.fill();
}
if(a.type==='pigeon'){
const x=a.x,y=a.y;
// Body
X.fillStyle='#889';X.beginPath();X.ellipse(x,y,4,3,0,0,6.28);X.fill();
// Head
const headDip=a.pecking&&!a.flyAway?Math.sin(performance.now()/100)*2:0;
X.beginPath();X.arc(x+3,y-2+headDip,2,0,6.28);X.fillStyle='#778';X.fill();
// Beak
X.fillStyle='#DA3';X.fillRect(x+5,y-2+headDip,2,1);
// Wings (if flying)
if(a.flyAway){
const wing=Math.sin(performance.now()/80)*4;
X.strokeStyle='#889';X.lineWidth=1;
X.beginPath();X.moveTo(x-2,y-2);X.lineTo(x-6,y-6+wing);X.stroke();
X.beginPath();X.moveTo(x+2,y-2);X.lineTo(x+6,y-6-wing);X.stroke();
}
}
});
}

// ── Wind effects: leaves/debris ──
const DEBRIS=Array.from({length:15},()=>({x:R()*1.2,y:R(),r:R()*3,sp:R()*2+1,rot:R()*6.28,type:R()>.5?'leaf':'paper'}));
function drawWindDebris(da){
if(weather.wind<10)return;
const n=performance.now()/1e3,intensity=Math.min(weather.wind/40,1);
DEBRIS.forEach((d,i)=>{
if(i>DEBRIS.length*intensity)return;
const dx=((d.x*W+n*d.sp*20+i*100)%(W+100))-50;
const dy=GY-20+Math.sin(n*2+d.rot)*15+d.y*20;
X.save();X.translate(dx,dy);X.rotate(n*3+d.rot);
if(d.type==='leaf'){
X.fillStyle=`hsl(${90+i*10},50%,${35+i*3}%)`;
X.beginPath();X.ellipse(0,0,d.r,d.r*.5,0,0,6.28);X.fill();
}else{
X.fillStyle='rgba(230,220,210,.5)';X.fillRect(-2,-2,4,4);
}
X.restore();
});
}

// ── Birds ──
function drawBirds(da,hour){
if(da<.3||hour<6||hour>20)return;
const n=performance.now()/1e3;
for(let i=0;i<4;i++){
const bx=((n*20+i*200)%(W+100))-50;
const by=80+i*30+Math.sin(n+i*2)*20;
const wing=Math.sin(n*5+i*3)*8;
X.strokeStyle='rgba(0,0,0,.4)';X.lineWidth=1;
X.beginPath();X.moveTo(bx-8,by+wing);X.lineTo(bx,by);X.lineTo(bx+8,by+wing);X.stroke();
}
}

// ── Snow on ground + snowman ──
function drawSnowGround(da){
if(weather.snow<=0)return;
const al=Math.min(weather.snow*.4,.5);
X.fillStyle=`rgba(240,240,255,${al})`;X.fillRect(0,GY-2,W,4);
// Snow on roofs
BLDGS.forEach(b=>{
X.fillStyle=`rgba(240,240,255,${al})`;
X.fillRect(b.x-2,GY-b.h-4,b.w+4,4);
});
// Rare snowman in park (heavy snow)
if(weather.snow>1){
const smx=W*.48,smy=GY;
X.fillStyle='#f0f0ff';
X.beginPath();X.arc(smx,smy-5,7,0,6.28);X.fill();
X.beginPath();X.arc(smx,smy-15,5,0,6.28);X.fill();
X.beginPath();X.arc(smx,smy-23,4,0,6.28);X.fill();
// Eyes
X.fillStyle='#000';X.beginPath();X.arc(smx-1.5,smy-24,1,0,6.28);X.fill();
X.beginPath();X.arc(smx+1.5,smy-24,1,0,6.28);X.fill();
// Carrot nose
X.fillStyle='#f80';X.beginPath();X.moveTo(smx,smy-22);X.lineTo(smx+5,smy-21);X.lineTo(smx,smy-20);X.fill();
}
}

// ── Weather (Open-Meteo API) ──
const rainDrops=Array.from({length:200},()=>({x:R()*1.2-.1,y:R(),sp:.02+R()*.03,len:5+R()*10}));
const snowFlakes=Array.from({length:150},()=>({x:R()*1.2-.1,y:R(),sp:.003+R()*.005,r:1+R()*2.5,drift:R()*6.28}));

async function fetchWeather(){
try{
const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=55.75&longitude=37.62&current=temperature_2m,rain,snowfall,cloud_cover,wind_speed_10m,weather_code&timezone=auto');
const d=await r.json();const c=d.current;
weather={temp:c.temperature_2m,rain:c.rain,snow:c.snowfall,cloud:c.cloud_cover,wind:c.wind_speed_10m,code:c.weather_code};
}catch(e){}}
fetchWeather();setInterval(fetchWeather,600000);

function drawRain(da){
if(weather.rain<=0)return;
const intensity=Math.min(weather.rain*30,200),n=performance.now()/1e3,windOff=weather.wind*.3;
X.strokeStyle=`rgba(150,180,255,${Math.min(.3+weather.rain*.1,.6)})`;X.lineWidth=1;
for(let i=0;i<intensity;i++){
const d=rainDrops[i%rainDrops.length];
const rx=(d.x*W+n*windOff*20+i*17)%W;
const ry=((d.y+n*d.sp*15+i*.07)%1)*GY;
X.beginPath();X.moveTo(rx,ry);X.lineTo(rx+windOff,ry+d.len);X.stroke();
}
if(weather.rain>1){for(let i=0;i<8;i++){
const px=(i*W/8+30)%W;
X.beginPath();X.ellipse(px,GY+3,10+i*3,2,0,0,6.28);
X.fillStyle='rgba(100,140,180,.15)';X.fill();
}}
}

function drawSnow(){
if(weather.snow<=0)return;
const intensity=Math.min(weather.snow*50,150),n=performance.now()/1e3;
for(let i=0;i<intensity;i++){
const s=snowFlakes[i%snowFlakes.length];
const sx=((s.x+Math.sin(n*.5+s.drift)*.03)*W+i*23)%W;
const sy=((s.y+n*s.sp+i*.05)%1)*GY;
X.beginPath();X.arc(sx,sy,s.r,0,6.28);
X.fillStyle=`rgba(255,255,255,${.4+s.r*.1})`;X.fill();
}
}

function drawWeatherOverlay(da){
if(weather.cloud>70){
const al=Math.min((weather.cloud-70)/60,.35);
X.fillStyle=`rgba(100,100,110,${al})`;X.fillRect(0,0,W,H*.5);
}
}

function drawWeatherInfo(da){
X.font='11px sans-serif';X.textAlign='left';
X.fillStyle=da>.5?'rgba(0,0,0,.4)':'rgba(255,255,255,.4)';
let desc='Clear';const c=weather.code;
if(c<=3)desc=['Clear','Mostly clear','Partly cloudy','Overcast'][c];
else if(c>=51&&c<=67)desc='Rain';
else if(c>=71&&c<=77)desc='Snow';
else if(c>=80&&c<=82)desc='Showers';
else if(c>=95)desc='Thunderstorm';
else if(c>=45&&c<=48)desc='Fog';
X.fillText(`${weather.temp|0}\u00B0C \u00B7 ${desc} \u00B7 Wind ${weather.wind|0} km/h`,15,25);
}

// ── Reflections in puddles (rain) ──
function drawPuddleReflections(da){
if(weather.rain<.5)return;
const n=performance.now()/1e3;
for(let i=0;i<5;i++){
const px=W*.1+i*W*.2,py=GY+5;
const ripple=Math.sin(n*3+i)*2;
X.strokeStyle=`rgba(180,200,230,${.1+weather.rain*.03})`;
X.lineWidth=.5;
X.beginPath();X.ellipse(px,py,8+ripple,2,0,0,6.28);X.stroke();
}
}

// ── Init ──
resize();

// ── Main render ──
function render(){
const now=new Date();
const hours=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
const n=performance.now()/1e3;
let da;
if(hours>=7&&hours<=17)da=1;
else if(hours>=5&&hours<7)da=(hours-5)/2;
else if(hours>17&&hours<=19)da=1-(hours-17)/2;
else da=0;

drawSky(da);
drawStars(1-da);
drawSun(hours);
drawMoon(hours);
drawClouds(da);
drawCloudShadows(da);

// Ground & road
drawRoad(da);
drawPuddleReflections(da);

// Park
drawPark(da,hours);

// Infrastructure
drawTrashCans(da);
drawBusStop(da);
drawTrafficLight(da,hours);

// Buildings (back layer)
BLDGS.forEach(b=>drawBuilding(b,hours,da));

// Snow ground & snowman
drawSnowGround(da);

// Birds
drawBirds(da,hours);

// Animals
updateAnimals(hours,n);
drawAnimals(da);

// Update & draw people (foreground)
updateCurtains(hours);
PEOPLE.forEach(p=>{updatePerson(p,hours);drawPerson(p,da)});

// Update & draw vehicles (top layer on road)
CARS.forEach(c=>{updateCar(c,hours);drawCar(c,da)});

// Weather effects (overlay)
drawWeatherOverlay(da);
drawRain(da);
drawSnow();
drawWindDebris(da);
drawWeatherInfo(da);

// Clock
const pad=n=>String(n).padStart(2,'0');
document.getElementById('clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
